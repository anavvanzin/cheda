name: Validate Astro site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test static artifact
        run: npm test

      - name: Summarize static artifact
        run: |
          echo "HTML pages: $(find dist -type f -name '*.html' | wc -l | tr -d ' ')"
          echo "Total files: $(find dist -type f | wc -l | tr -d ' ')"
          du -sh dist

# Deployment is handled by the Vercel Git integration:
# - pull request / feature branch -> Preview Deployment
# - main -> Production Deployment for patriciacheda.com
