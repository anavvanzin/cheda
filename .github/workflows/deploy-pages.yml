name: Deploy Astro site to Pages

# Builds the Astro static site and publishes dist/ to GitHub Pages.
# Replaces the old Jekyll workflow (this is an Astro project, not Jekyll).

on:
  # Deploy on pushes to main
  push:
    branches: ["main"]
  # Build (without deploying) on PRs so problems surface before merge
  pull_request:
    branches: ["main"]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Least-privilege token; Pages deploy needs pages:write + id-token:write
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production
# deploy so a running publish always finishes cleanly.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Verify custom-domain CNAME is in the build output
        run: |
          test -f dist/CNAME || { echo "::error::dist/CNAME missing"; exit 1; }
          echo "CNAME -> $(cat dist/CNAME)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    # Only deploy from main; PRs run build-only for validation.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
