<!doctype html>
<html lang="pt-BR" data-lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chêda · Patrícia Chêda</title>
  <meta name="theme-color" content="#0E0B0A">
  <meta name="description" content="Chêda — Patrícia Chêda. Techno, tech house, noise. Florianópolis, BR.">
  <meta property="og:title" content="Chêda · Patrícia Chêda">
  <meta property="og:description" content="Manifesto artístico em forma de pista. Techno · tech house · noise. Floripa, SC.">
  <meta property="og:image" content="assets/portrait-ritual.jpg">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <style>
  /*
    LANDING — direct. One screen. No sections stacked below.
    Structure:
      · Language toggle (top right)
      · Wordmark "Chêda" (giant, center-left)
      · Portrait (large, right side, same face from the ritual)
      · One-line manifesto (below wordmark)
      · Three routes: mixes / contato / press kit A4 (spread page)
      · Instagram + email as small chips in the corner

    Everything else lives inside /print/spread.html.
  */

  html,body{ margin:0; background:var(--ink); color:var(--cream);
    font-family:var(--body-font); overflow-x:hidden;
    -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; }

  /* Language toggle */
  .lang-toggle{
    position: fixed; top: 20px; right: 20px; z-index: 100;
    display: flex; gap: 4px;
    background: rgba(14,11,10,.75);
    padding: 4px; border: 1px solid rgba(233,224,206,.2);
    backdrop-filter: blur(10px);
  }
  .lang-toggle button{
    font-family: var(--display-font); font-weight: 500;
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    padding: 6px 12px; background: transparent; color: rgba(233,224,206,.55);
    border: 0; cursor: pointer; transition: all .2s;
  }
  .lang-toggle button:hover{ color: var(--cream); }
  .lang-toggle button.on{ background: var(--blood); color: var(--paper); }

  /* Instagram/email small chips top-left */
  .quick-links{
    position: fixed; top: 20px; left: 20px; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    background: rgba(14,11,10,.75);
    padding: 8px 14px; border: 1px solid rgba(233,224,206,.2);
    backdrop-filter: blur(10px);
    font-family: var(--display-font); font-weight: 500;
    font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
  }
  .quick-links a{ color: rgba(233,224,206,.7); transition: color .2s; }
  .quick-links a:hover{ color: var(--blood); }
  .quick-links .sep{ color: rgba(233,224,206,.25); }

  /* ═══════════ STAGE ═══════════ */
  .stage{
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    align-items: center;
    padding: clamp(80px, 10vh, 140px) clamp(32px, 6vw, 96px) clamp(48px, 6vh, 96px);
    gap: clamp(24px, 4vw, 60px);
    position: relative;
    background:
      radial-gradient(60% 80% at 80% 40%, rgba(181,34,26,.18), transparent 70%),
      repeating-linear-gradient(45deg,
        rgba(181,34,26,.04) 0 1px, transparent 1px 80px),
      var(--ink);
  }
  .stage::before{
    content:""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1.4px);
    background-size: 3px 3px; mix-blend-mode: overlay; opacity: .28;
  }

  /* ═══════════ LEFT — wordmark + manifesto + routes ═══════════ */
  .left{ position: relative; z-index: 2; }

  .eyebrow{
    display: block; margin-bottom: 18px;
    font-family: var(--display-font); font-weight: 500;
    font-size: 11px; letter-spacing: .32em; text-transform: uppercase;
    color: var(--gold);
  }

  .wordmark-hero{
    font-family: var(--display-font); font-weight: 500;
    font-size: clamp(80px, 15vw, 220px); line-height: .9;
    letter-spacing: .01em; color: var(--paper); margin: 0;
  }
  .wordmark-hero .name-serif{
    display: block; margin-top: 14px;
    font-family: var(--serif-font); font-style: italic; font-weight: 500;
    font-size: clamp(18px, 2vw, 28px); letter-spacing: .01em;
    color: var(--gold);
  }

  .manifesto-line{
    max-width: 42ch;
    margin: 32px 0 44px;
    font-family: var(--serif-font); font-style: italic;
    font-size: clamp(17px, 1.7vw, 22px); line-height: 1.4;
    color: var(--cream);
  }
  .manifesto-line em{ color: var(--blood); font-style: italic; }

  /* Three routes — direct, no ornament */
  .routes{
    display: flex; flex-direction: column; gap: 0;
    max-width: 480px;
    border-top: 1px solid rgba(199,154,75,.3);
  }
  .route{
    display: grid; grid-template-columns: 40px 1fr auto;
    align-items: center; gap: 16px;
    padding: 18px 4px;
    border-bottom: 1px solid rgba(199,154,75,.3);
    transition: padding .2s, background .2s;
  }
  .route:hover{ padding-left: 12px; background: rgba(181,34,26,.06); }
  .route .num{
    font-family: var(--display-font); font-weight: 500;
    font-size: 13px; letter-spacing: .18em; color: var(--gold);
  }
  .route .label{
    font-family: var(--display-font); font-weight: 500;
    font-size: clamp(15px, 1.4vw, 18px); letter-spacing: .06em;
    color: var(--paper);
  }
  .route .arrow{
    font-family: var(--display-font); font-weight: 500;
    font-size: 16px; color: var(--blood);
    transition: transform .2s;
  }
  .route:hover .arrow{ transform: translateX(4px); }

  /* ═══════════ RIGHT — portrait ═══════════ */
  .right{ position: relative; z-index: 2; }
  .portrait-frame{
    position: relative;
    width: 100%; max-width: 520px; margin-left: auto;
    aspect-ratio: 4/5;
    border: 2px solid rgba(181,34,26,.55);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(199,154,75,.35),
      0 24px 80px rgba(0,0,0,.6),
      0 0 60px rgba(181,34,26,.18);
    transform: rotate(1.2deg);
  }
  .portrait-frame img{
    width: 100%; height: 100%; object-fit: cover;
    object-position: center 15%;
    filter: contrast(1.08) brightness(.96);
  }
  /* Subtle red plate offset behind the portrait, like the poster plate */
  .portrait-frame::before{
    content: ""; position: absolute;
    inset: 12px 12px -12px -12px;
    border: 1.5px solid rgba(181,34,26,.4);
    z-index: -1;
  }

  /* ═══════════ FOOTER ROW — pure info ═══════════ */
  .stage-foot{
    position: absolute; left: clamp(32px, 6vw, 96px); right: clamp(32px, 6vw, 96px);
    bottom: clamp(20px, 3vh, 32px);
    display: flex; justify-content: space-between; align-items: center;
    gap: 20px; flex-wrap: wrap;
    font-family: var(--display-font); font-weight: 500;
    font-size: 10px; letter-spacing: .32em; text-transform: uppercase;
    color: var(--mute); z-index: 3;
  }

  /* ═══════════ MOBILE ═══════════
     Stack vertically. Portrait becomes a strip up top.
     Wordmark + manifesto + routes below. */
  @media (max-width: 820px){
    .stage{
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      padding-top: 100px;
      gap: clamp(24px, 4vh, 40px);
    }
    .right{ order: -1; }
    .portrait-frame{ margin: 0 auto; max-width: 320px; }
    .stage-foot{ position: static; margin-top: 40px; }
  }
  @media (max-width: 480px){
    .portrait-frame{ max-width: 260px; transform: rotate(0); }
    .lang-toggle, .quick-links{ top: 12px; }
    .lang-toggle{ right: 12px; }
    .quick-links{ left: 12px; font-size: 10px; padding: 6px 10px; gap: 8px; }
    .quick-links .hide-mobile{ display: none; }
  }
  </style>
</head>
<body>

<nav class="quick-links" aria-label="Contact">
  <a href="https://www.instagram.com/patriciacheda_/" target="_blank" rel="noopener">@patriciacheda_</a>
  <span class="sep">·</span>
  <a href="mailto:patriciavchedach@gmail.com" class="hide-mobile" data-i18n="quick.mail">contato</a>
  <a href="mailto:patriciavchedach@gmail.com" style="display:none" class="show-mobile">✉</a>
</nav>

<nav class="lang-toggle" aria-label="Language">
  <button class="on" data-lang="pt" aria-pressed="true">PT</button>
  <button data-lang="en" aria-pressed="false">EN</button>
</nav>

<main class="stage">
  <div class="left">
    <span class="eyebrow" data-i18n="eyebrow">Digital Press Kit · 2026</span>

    <h1 class="wordmark-hero">
      CHÊDA
      <span class="name-serif">Patrícia Chêda</span>
    </h1>

    <p class="manifesto-line">
      <span data-i18n="manifesto">
        <em>Música em movimento.</em> Movimento em unidade. Cada batida ecoa o pulsar da própria vida.
      </span>
    </p>

    <nav class="routes" aria-label="Onde ir">
      <a class="route" href="/print/spread.html#mixes">
        <span class="num">01</span>
        <span class="label" data-i18n="route.mixes">Mixes · Listen</span>
        <span class="arrow">→</span>
      </a>
      <a class="route" href="mailto:patriciavchedach@gmail.com?subject=Booking%20%C2%B7%20Ch%C3%AAda">
        <span class="num">02</span>
        <span class="label" data-i18n="route.booking">Booking · Contato</span>
        <span class="arrow">→</span>
      </a>
      <a class="route" href="/print/spread.html">
        <span class="num">03</span>
        <span class="label" data-i18n="route.press">Press kit A4</span>
        <span class="arrow">→</span>
      </a>
    </nav>
  </div>

  <div class="right">
    <div class="portrait-frame">
      <img src="assets/portrait-ritual.jpg" alt="Patrícia Chêda — retrato editorial">
    </div>
  </div>

  <div class="stage-foot">
    <span>Florianópolis · SC · Brasil</span>
    <span>Techno · Tech House · Noise</span>
  </div>
</main>

<script>
const i18n = {
  'eyebrow':       { pt: 'Digital Press Kit · 2026',       en: 'Digital Press Kit · 2026' },
  'manifesto':     { pt: '<em>Música em movimento.</em> Movimento em unidade. Cada batida ecoa o pulsar da própria vida.',
                     en: '<em>Music into movement.</em> Movement into unity. Every beat echoes the pulse of life itself.' },
  'quick.mail':    { pt: 'contato',                        en: 'contact' },
  'route.mixes':   { pt: 'Mixes · Listen',                 en: 'Mixes · Listen' },
  'route.booking': { pt: 'Booking · Contato',              en: 'Booking · Contact' },
  'route.press':   { pt: 'Press kit A4',                   en: 'A4 press kit' }
};

function setLang(lang){
  document.documentElement.dataset.lang = lang;
  document.documentElement.lang = lang === 'en' ? 'en' : 'pt-BR';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if(i18n[k] && i18n[k][lang]) el.innerHTML = i18n[k][lang];
  });
  document.querySelectorAll('.lang-toggle button').forEach(b => {
    const on = b.dataset.lang === lang;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on);
  });
}
document.querySelectorAll('.lang-toggle button').forEach(b => {
  b.addEventListener('click', () => setLang(b.dataset.lang));
});
setLang('pt');
</script>

</body>
</html>
